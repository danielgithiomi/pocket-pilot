@if (isFormOpen()) {
  <organism-form
    id="transactions"
    title="New Category"
    [class.hidden]="!isFormOpen()"
    (closeForm)="handleCloseForm()"
    description="Create a new category"
  >
    <form slot="content" id="category-form" (submit)="submitCategory($event)">
      <atom-input
        type="text"
        id="category-name"
        [inverted]="true"
        autocomplete="name"
        label="Category Name"
        placeholder="Eg: Groceries"
        [formField]="categoryForm.categoryName"
        (clearOutput)="categoryForm.categoryName().controlValue.set('')"
      />

      <div class="flex flex-col items-start gap-1">
        <p class="text-inverted-text"><span class="text-xs text-error mr-0.5">*</span>Type:</p>

        <atom-tab-list
          [items]="categoryTabItems"
          (selectedIndex)="handleCategoryTypeSelected($event)"
          [activeItem]="categoryFormModel().categoryType === 'INCOME' ? 0 : 1"
        />
      </div>
    </form>

    <div class="w-full flex flex-row items-center justify-end gap-4" slot="footer">
      <atom-button
        type="button"
        [inverted]="true"
        label="Reset Form"
        variant="secondary"
        form="category-form"
        id="reset-category-form"
        (clicked)="resetCategoryForm()"
        [disabled]="!categoryForm().dirty() || isSubmitting()"
      />

      <atom-button
        type="submit"
        form="category-form"
        label="Create Category"
        id="submit-category-form"
        [isLoading]="isSubmitting()"
        [disabled]="categoryForm().invalid() || isSubmitting()"
      />
    </div>
  </organism-form>
}
