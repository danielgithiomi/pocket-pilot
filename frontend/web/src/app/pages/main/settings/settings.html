<section class="page" id="settings-page">
  <div class="page-header">
    <h1 class="page-title">Settings &amp; Categories</h1>

    <atom-button id="add-category" variant="primary" (clicked)="handleOpenForm()">
      <div class="w-full flex flex-row items-center justify-between gap-4">
        <lucide-icon name="create-category" [img]="Plus" [size]="iconSize"></lucide-icon>
        <span class="hidden sm:block">Add Category</span>
      </div>
    </atom-button>
  </div>

  <div class="page-container flex-1 flex flex-col md:flex-row gap-6">
    <!-- Settings Section -->
    <div class="flex-1" id="settings">
      <h2 class="text-xl lg:text-2xl font-semibold">Settings</h2>
    </div>

    <!-- Categories Section -->
    <categories (onCategoryDelete)="deleteCategory($event)" class="flex-1"/>
  </div>
</section>

@if (isCategoriesFormOpen()) {
  <categories-form
    (categoriesFormClosed)="handleCloseForm()"
    [isCategoriesFormOpen]="isCategoriesFormOpen()"
  />
}
