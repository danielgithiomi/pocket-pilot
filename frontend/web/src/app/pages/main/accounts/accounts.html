<section id="accounts-page" class="page">
  <div class="page-header">
    <h1 class="page-title">Accounts</h1>

    <atom-button id="add-account" variant="primary" (clicked)="isFormOpen.set(true)">
      <div class="w-full flex flex-row items-center justify-between gap-4">
        <lucide-icon name="create-wallet" [img]="Plus" [size]="iconSize"></lucide-icon>
        <span class="hidden sm:block">Add Account</span>
      </div>
    </atom-button>
  </div>

  <div class="page-container flex-1 grid place-items-center">
    @let response = accountsWithCount.value()?.data;
    @if (response?.count != 0) {
      <p>Accounts found: {{ response?.count }}</p>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        @for (account of response?.data; track account.id) {
          <div class="bg-alternate-background rounded-lg p-4">
            <h3 class="text-lg font-semibold">{{ account.name }}</h3>
            <p class="text-muted-foreground">{{ account.balance }}</p>
          </div>
        }
      </div>
    } @else {
      <no-data message="No accounts found!" />
    }
  </div>
</section>

<app-form
  id="accounts"
  title="Add Account"
  [class.hidden]="!isFormOpen()"
  description="Create a new account"
  (closeForm)="isFormOpen.set(false)"
>
  <form slot="content" id="accounts-form" (submit)="submitAccountsForm($event)">
    <atom-input
      id="name"
      type="text"
      [inverted]="true"
      autocomplete="name"
      label="Account Name"
      [formField]="accountsForm.name"
      placeholder="Eg: Savings Account"
      (clearOutput)="accountsForm.name().controlValue.set('')"
    />
  </form>

  <div slot="footer">
    <atom-button
      type="submit"
      form="accounts-form"
      label="Create Account"
      id="submit-account-form"
      [isLoading]="isSubmitting()"
      [disabled]="accountsForm().invalid() || isSubmitting()"
    />
  </div>
</app-form>
