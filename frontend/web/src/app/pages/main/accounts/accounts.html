<section id="accounts-page" class="page">
  <div class="page-header">
    <h1 class="page-title">Accounts</h1>

    <atom-button id="add-account" variant="primary" (clicked)="isFormOpen.set(true)">
      <div class="w-full flex flex-row items-center justify-between gap-4">
        <lucide-icon name="create-wallet" [img]="Plus" [size]="iconSize"></lucide-icon>
        <span class="hidden sm:block">Add Account</span>
      </div>
    </atom-button>
  </div>

  <div class="page-container flex-1 grid place-items-center">
    <no-data message="No accounts found!" />
  </div>
</section>

@if (isFormOpen()) {
  <app-form
    id="accounts"
    title="Add Account"
    description="Create a new account"
    (closeForm)="isFormOpen.set(false)"
  />
}
