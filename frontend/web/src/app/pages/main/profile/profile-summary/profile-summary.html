<profile-picture />

<!-- User Info -->
<div class="flex flex-col justify-between gap-2 h-25 grow">
  <div>
    <p class="text-lg font-semibold truncate-text">{{ authService.user()?.name }}</p>
    <p class="text-xs text-primary/75 font-semibold">{{ authService.user()?.email }}</p>
  </div>

  <div class="flex flex-row items-center justify-start gap-4">
    <atom-button
      label="Edit Profile"
      id="go-to-edit-profile"
      [disabled]="isFetching()"
      (click)="editProfileClicked.emit()"
    />
  </div>
</div>
