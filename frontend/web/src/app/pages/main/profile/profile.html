<section id="profile-page" class="page">
  <p class="page-title">Profile</p>

  <div class="page-container flex flex-row gap-4">
    <div class="page-card w-full md:w-1/2">
      <div class="card-header">
        <p class="title">Personal Information.</p>
        <p class="subtitle">Your account details and information.</p>
      </div>

      <div class="card-content p-2">
        <profile-detail detailVariant="name" detailValue="Daniel Githiomi"></profile-detail>
        <profile-detail detailVariant="email" detailValue="daniel@gmail.com"></profile-detail>
        <profile-detail detailVariant="phone" detailValue="+254 700 000 000"></profile-detail>
        <profile-detail detailVariant="role" detailValue="Admin"></profile-detail>
        <profile-detail detailVariant="status" detailValue="Active"></profile-detail>
        <profile-detail
          detailVariant="last-login"
          detailValue="2025-10-15 12:00:00"
          [isLast]="true"
        ></profile-detail>
      </div>
    </div>
  </div>
</section>
