<section id="profile-page" class="page">
  <p class="page-title">Profile</p>

  <div class="page-container flex flex-row gap-4">
    <div
      class="page-card w-full md:w-1/2"
      [ngClass]="{ 'md:w-full lg:w-1/2': !drawerService.isDrawerCollapsed() }"
    >
      <div class="card-header">
        <p class="title">Personal Information.</p>
        <p class="subtitle">Your account details and information.</p>
      </div>

      <div class="card-content p-2">
        <profile-detail detailVariant="name" [detailValue]="user.name"></profile-detail>
        <profile-detail detailVariant="email" [detailValue]="user.email"></profile-detail>
        <profile-detail detailVariant="phone" [detailValue]="user.id"></profile-detail>
        <profile-detail detailVariant="role" [detailValue]="user.updatedAt"></profile-detail>
        <profile-detail detailVariant="status" detailValue="active"></profile-detail>
        <profile-detail
          [isLast]="true"
          detailVariant="last-login"
          [detailValue]="user.createdAt"
        ></profile-detail>
      </div>
    </div>
  </div>
</section>
