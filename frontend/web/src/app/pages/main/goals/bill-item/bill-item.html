<div [id]="billItemId()" class="bill-item">
  <div class="bill-item-logo">
    <lucide-angular name="bill-item-logo" [img]="sailboat" [size]="iconSize"></lucide-angular>
  </div>

  <div class="bill-item-content">
    <p class="bill-item-title">{{ billItem().name }}</p>
    <p class="bill-item-charge">
      Next billing date: <span class="font-bold">{{ formattedDate() }}</span>
    </p>
  </div>

  <div class="bill-item-amount">
    <p>{{ formattedAmount() }}</p>

    @if (billItem().currency !== currency) {
      <p class="bill-item-converted-amount">≈{{ covertedCurrencyAmount() }}</p>
    }
  </div>
</div>
