<section id="account-details-page" class="page">
  <div class="page-header">
    <h1 class="page-title">Account Details</h1>
  </div>

  <div class="page-container">
    @if (isLoadingResources()) {
      <div class="flex flex-row items-center gap-2 mt-2">
        <div class="skeleton size-5 rounded-full"></div>
        <div class="skeleton w-1/5 h-4"></div>
      </div>
    } @else {
      <breadcrumbs [breadcrumbItems]="breadcrumbItems()" [icon]="breadcrumbIcon" />
    }
  </div>
</section>
