<section id="account-details-section" class="flex w-full flex-col sm:flex-row md:flex-col gap-6">
  <account-card
    variant="detail"
    [id]="account().id"
    [isLoading]="false"
    [account]="account()"
    class="flex-0 sm:flex-1 md:flex-0 p-5 sm:p-2 xl:p-5"
  />

  <div class="flex-0 sm:flex-1 md:flex-0 cursor-default md:ms-2">
    <h5 class="underline text-lg underline-offset-2 font-semibold mb-2">Summary</h5>

    <div class="flex flex-col gap-1 text-sm ms-1">
      <summary-item label="Name" id="account-name" [value]="account().name" />
      <summary-item label="Type" id="account-type" [value]="account().type" />
      <summary-item label="Currency" id="account-currency" [value]="account().currency" />
      <summary-item label="Balance" id="account-balance" [value]="formatBalance()" />

      @if (isDifferentCurrency()) {
        <summary-item label="Conversion" id="account-conversion" [value]="formatConversion()" />
      }

      <summary-item
        id="transaction-count"
        label="No. of Transactions"
        [value]="transactionCount().toString()"
      />
      <summary-item
        id="date-created"
        label="Date Created"
        [value]="formatDate(account().createdAt)"
      />
      <summary-item
        id="last-activity"
        label="Last Activity"
        [value]="formatDate(account().updatedAt)"
      />
    </div>
  </div>
</section>
