<section id="account-details-section" class="flex h-full flex-col sm:flex-row md:flex-col gap-6">
  <account-card
    variant="detail"
    [id]="account().id"
    [isLoading]="false"
    [account]="account()"
    class="flex-0 sm:flex-1 md:flex-0"
  />

  <div class="flex-0 sm:flex-1 md:flex-0">
    <h5 class="underline text-lg underline-offset-2 font-semibold mb-2">Summary</h5>

    <div class="flex flex-col gap-2 text-sm pl-2">
      <summary-item id="account-name" label="Account Name" [value]="formatText(account().name)" />
      <summary-item id="account-type" label="Account Type" [value]="account().type" />
      <summary-item id="account-currency" label="Account Currency" [value]="account().currency" />
      <summary-item
        id="transaction-count"
        label="No. of Transactions"
        [value]="transactionCount().toString()"
      />
      <summary-item
        id="date-created"
        label="Date Created"
        [value]="formatDate(account().createdAt)"
      />
      <summary-item
        id="last-activity"
        label="Last Activity"
        [value]="formatDate(account().updatedAt)"
      />
    </div>
  </div>
</section>
