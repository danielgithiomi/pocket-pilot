<section class="flex-1 flex flex-col gap-4 h-full" id="settings">

  <div class="flex flex-col gap-2">
    <h2 class="text-xl lg:text-2xl font-semibold">Your Settings</h2>
    <p>Customize your user experience</p>
  </div>

  <div class="settings-card">
    <div class="settings-form">
      <settings-form [isSubmittingForm]="isSubmittingSettingsForm()"/>
    </div>

    <div class="settings-form-buttons">
      <atom-button [disabled]="isSubmittingSettingsForm()" id="reset-settings" label="Reset Form" variant="secondary"/>
      <atom-button [disabled]="isSubmittingSettingsForm()" id="save-settings" label="Save Settings" variant="primary"/>
    </div>

  </div>
</section>
