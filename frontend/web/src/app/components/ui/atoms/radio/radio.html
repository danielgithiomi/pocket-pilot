<div id="radio-{{ id() }}-wrapper" class="radio-field">
  <label
    [for]="inputId()"
    [ngClass]="{ 'text-inverted-text': inverted(), 'text-primary-text': invertLabel() }"
  >
    @if (required()) {
      <span class="required">*</span>
    }
    {{ label() }}:
    <input [id]="inputId()" class="hidden" />
  </label>

  <div
    [id]="inputId()"
    role="radiogroup"
    class="radio-options-wrapper"
    [attr.aria-labelledby]="'radio-' + id() + '-label'"
    [ngClass]="{
      'layout-grid': layout() === 'grid',
      'layout-vertical': layout() === 'vertical',
      'layout-horizontal': layout() === 'horizontal',
    }"
  >
    @for (option of options(); track option.value) {
      <div
        role="radio"
        class="radio-option"
        (click)="onOptionClick(option)"
        [attr.aria-checked]="isOptionSelected(option)()"
        [attr.aria-disabled]="isOptionDisabled(option)()"
        [attr.tabindex]="isOptionDisabled(option)() ? -1 : 0"
        [ngClass]="{
          'text-inverted-text': inverted(),
          selected: isOptionSelected(option)(),
          disabled: isOptionDisabled(option)(),
        }"
      >
        <div class="radio-icon">
          @if (isOptionSelected(option)()) {
            <icon-checked-circle
              [filled]="true"
              [size]="iconSize"
              fillColor="var(--primary)"
              [color]="inverted() ? 'var(--inverted-text)' : 'var(--primary-text)'"
            />
          } @else {
            <lucide-icon name="unchecked" [img]="Unchecked" [size]="iconSize" />
          }
        </div>

        <span
          class="radio-label"
          [ngClass]="{
            'font-semibold': isOptionSelected(option)(),
          }"
          >{{ option.label }}</span
        >
      </div>
    }
  </div>

  @if (formField()().invalid() && formField()().touched()) {
    <div class="radio-select-errors-wrapper">
      @for (error of formField()().errors(); track error.kind) {
        <p class="radio-select-error">
          {{ error.message }}
        </p>
      }
    </div>
  }
</div>
