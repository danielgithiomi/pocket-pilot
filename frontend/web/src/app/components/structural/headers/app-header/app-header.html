<header>
  <div class="flex flex-row items-center gap-2">
    <div class="hamburger-wrapper group" (click)="hamburgerClickEmitter.emit()">
      <lucide-angular
        size="24"
        name="hamburger-icon"
        class="hamburger-icon"
        [img]="isMobileDrawerOpen() ? X : Menu"
      />
    </div>

    <div class="flex flex-row items-center space-x-4">
      <div class="vertical-separator h-8"></div>

      <h1 class="text-lg font-bold">Pocket Pilot</h1>
    </div>
  </div>

  <div class="flex gap-4">
    <icon-notification-bell />
    <icon-settings />
  </div>
</header>
