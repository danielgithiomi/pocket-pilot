<aside id="drawer" class="relative h-full z-1">
  
  <div class="drawer-toggler" (click)="toggleOutput.emit()">
    <icon-chevron [size]="10" color="white" [direction]="drawerOpen() ? 'left' : 'right'" />
  </div>

  <img
    priority
    id="drawer-logo"
    [ngSrc]="logoUrl"
    class="drawer-logo"
    alt="Pocket Pilot Logo"
    [width]="logoDimensions.width"
    [height]="logoDimensions.height"
  />
</aside>
