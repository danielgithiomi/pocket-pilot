<aside id="drawer" class="relative h-full">
  <div
    id="close-drawer"
    class="absolute bg-alternate-background w-4 h-10 top-1/2 -right-4 rounded-r-lg opacity-75"
  ></div>

  <img
    priority
    id="drawer-logo"
    [ngSrc]="logoUrl"
    class="drawer-logo"
    alt="Pocket Pilot Logo"
    [width]="logoDimensions.width"
    [height]="logoDimensions.height"
  />
</aside>
