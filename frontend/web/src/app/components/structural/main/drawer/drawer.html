<aside id="drawer" class="relative h-full">
  
  <div id="close-drawer" class="drawer-toggler">
    <icon-chevron [size]="10" direction="left" color="white" />
  </div>

  <img
    priority
    id="drawer-logo"
    [ngSrc]="logoUrl"
    class="drawer-logo"
    alt="Pocket Pilot Logo"
    [width]="logoDimensions.width"
    [height]="logoDimensions.height"
  />
</aside>
