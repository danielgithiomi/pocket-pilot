<aside id="drawer" class="drawer">
  <div class="drawer-toggler" (click)="toggleOutput.emit()">
    <icon-chevron [size]="10" [direction]="drawerOpen() ? 'left' : 'right'" />
  </div>

  <div class="drawer-header">
    <img
      priority
      id="drawer-logo"
      [ngSrc]="logoUrl"
      alt="Pocket Pilot Logo"
      [width]="logoDimensions.width"
      [height]="logoDimensions.height"
      class="drawer-logo invert dark:invert-0"
    />
  </div>

  <div class="drawer-content">
    <div class="links">
      @for (link of links; track link.name) {
        <nav-link [isDrawerExpanded]="drawerOpen()" [link]="link"></nav-link>
      }
    </div>
  </div>

  <div class="drawer-footer">
    <div class="bordered-card p-3! items-center!" [ngClass]="{ 'justify-center!': !drawerOpen() }">
      <div class="relative">
        <span class="h-2 w-2 rounded-full bg-success block"></span>
        <span class="absolute inset-0 h-2 w-2 rounded-full bg-success animate-ping"></span>
      </div>

      @if (drawerOpen()) {
        <p>System Online</p>
      }
    </div>
  </div>
</aside>
